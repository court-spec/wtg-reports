name: Sync HubSpot to Google Sheets + Build Dashboards

on:
  schedule:
    # Daily at 6:00 AM Central (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:

# Prevent concurrent runs (they race on the Google Sheet rewrite)
concurrency:
  group: sync-pipeline
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Sync HubSpot → Google Sheets
        env:
          HUBSPOT_TOKEN:   ${{ secrets.HUBSPOT_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
        run: python -u sync_hubspot_deals.py

      - name: Sync Google Ads → Google Sheets
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN:    ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:          ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:      ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:      ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID:  ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_SHEET_ID:               ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_JSON:                ${{ secrets.GOOGLE_SA_JSON }}
        run: python -u scripts/sync_google_ads.py
        continue-on-error: true  # don't block dashboard builds if Google Ads sync fails

      - name: Build Pipeline Action Dashboard
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
        run: python -u scripts/build_pipeline_dashboard.py

      - name: Build Deal Won Time Dashboard
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
        run: python -u scripts/build_deal_won_dashboard.py

      - name: Build Executive Dashboard
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SA_JSON:  ${{ secrets.GOOGLE_SA_JSON }}
        run: python -u scripts/build_executive_dashboard.py

      - name: Build landing page
        run: python -u scripts/build_index.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=referral-wins-by-insurance-type --branch=main
